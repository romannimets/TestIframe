<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024, height=1536">
  <title>Iframe Page</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1024px;
      height: 1536px;
      font-family: sans-serif;
      background: #f0f0f0;
      overflow: hidden;
    }

    /* esempio di contenuto centrato */
    .content {
      width: 1000px;
      margin: 20px auto;
      text-align: center;
    }

    h1 {
      font-size: 48px; /* apparirà come 12px nello iframe */
    }

    p {
      font-size: 24px; /* apparirà come 6px nello iframe */
    }

    button {
      font-size: 32px; /* apparirà come 8px nello iframe */
      padding: 20px 40px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>Benvenuto!</h1>
    <p>Questa pagina è ottimizzata per il tuo iframe 256x384.</p>
    <button>Click me</button>
  </div>
</body>
</html>
