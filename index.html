<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Iframe Test</title>
  <style>
    body {
      font-family: sans-serif;
      font-size: 32px; /* grande per leggere dopo scale */
      margin: 0;
      padding: 20px;
      background-color: #f0f0f0;
      color: #333;
    }
    h1 {
      font-size: 48px;
      color: #007acc;
    }
    p {
      font-size: 32px;
    }
    .box {
      width: 800px; /* più grande di iframe originale per vedere contenuto */
      height: 600px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 64px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>Pagina di Test Iframe</h1>
  <p>Questa pagina è visibile dentro il tuo layout 256x384 con scale 0.25</p>
  <div class="box">CONTENUTO</div>
  <div class="box">CONTENUTO 2</div>
</body>
</html>
